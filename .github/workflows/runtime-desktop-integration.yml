name: runtime-desktop-integration

on:
  push:
    branches: [agent/me3-runtime-foundation]
    paths:
      - scripts/apply-runtime-desktop-integration.mjs
      - .github/workflows/runtime-desktop-integration.yml
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply-runtime-desktop-integration.mjs
      - .github/workflows/runtime-desktop-integration.yml

permissions:
  contents: write

concurrency:
  group: runtime-desktop-integration
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/me3-runtime-foundation
          fetch-depth: 0
      - name: Apply integration migration
        run: node scripts/apply-runtime-desktop-integration.mjs
      - name: Remove one-shot migration files
        run: |
          rm scripts/apply-runtime-desktop-integration.mjs
          rm .github/workflows/runtime-desktop-integration.yml
      - name: Commit integrated runtime trunk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(runtime): integrate desktop authority and persisted sessions"
          git push origin HEAD:agent/me3-runtime-foundation
