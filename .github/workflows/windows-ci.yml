# SoulForge V0.5 Windows CI — automated gates only (no private game assets).
name: windows-ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Core smoke processes are intentionally separate. Each command preserves
      # the original npm-workspace cwd so the diagnostic split cannot change behavior.
      - name: Core — reference confidence
        working-directory: packages/core
        run: node dist/testing/runSyntheticConfirmedReferenceSmoke.js

      - name: Core — V0.5 foundation
        working-directory: packages/core
        run: node dist/testing/runV05FoundationSmoke.js

      - name: Core — file rollback
        working-directory: packages/core
        run: node dist/testing/runV05FileRollbackSmoke.js

      - name: Core — security boundary
        working-directory: packages/core
        run: node dist/testing/runV05SecurityBoundarySmoke.js

      - name: Core — SQLite authority
        working-directory: packages/core
        run: node dist/testing/runV05SqliteAuthoritySmoke.js

      - name: Core — persistence
        working-directory: packages/core
        run: node dist/testing/runV05PersistSmoke.js

      - name: Core — P1 integration
        working-directory: packages/core
        run: node dist/testing/runV05P1Smoke.js

      - name: Core — architecture scaffold
        working-directory: packages/core
        run: node dist/testing/runV05ArchitectureScaffoldSmoke.js

      - name: Core — write-path consolidation
        working-directory: packages/core
        run: node dist/testing/runV05WritePathConsolidationSmoke.js

      - name: Core — full-file workbench
        working-directory: packages/core
        run: node dist/testing/runV05FullFileWorkbenchSmoke.js

      - name: Core — raw-file workbench
        working-directory: packages/core
        run: node dist/testing/runV05RawFileWorkbenchSmoke.js

      - name: Core — native container workbench
        working-directory: packages/core
        run: node dist/testing/runV06NativeContainerWorkbenchSmoke.js

      - name: Core — EMEVD DSL compiler
        working-directory: packages/core
        run: node dist/testing/runEmevdDslCompilerSmoke.js

      - name: Desktop security gate
        run: npm run test:desktop-security

      - name: UI localization gate
        run: npm run test:ui-localization

      - name: Database utility smoke
        run: npm run test:database-utility

      - name: Bridge synthetic fixtures
        run: npm run bridge:verify:synthetic

      - name: Bridge daemon
        run: npm run bridge:verify:daemon

      - name: OpenAI Responses adapter
        run: npm run test:openai-responses

      - name: Workbench projections
        run: npm run test:workbench-projections

      - name: EMEVD four-view
        run: npm run test:emevd-four-view

      - name: DDS convert writeback
        run: npm run test:dds-convert-writeback

      - name: Vault encrypt contract
        run: npm run test:vault-encrypt-contract

      - name: Scene asset inventory
        run: npm run test:scene-asset-inventory

      - name: Performance baseline
        run: npm run test:performance-baseline

      - name: Paramdef layout
        run: npm run test:paramdef-layout

      - name: EMEVD / FMG / MSB / PARAM IPC contracts
        run: |
          npm run test:emevd-ipc-contract
          npm run test:fmg-msb-ipc-contract
          npm run test:param-msb-write-ipc-contract
          npm run test:desktop-live-editor-contract
          npm run test:emedf-schema
          npm run test:emevd-envelope-map
          npm run test:flver-candidate
          npm run test:vault-encrypt-contract

      - name: Portable packaging config gate
        run: npm run test:portable-packaging-gate

      - name: Private native / section-28 honest skip
        run: |
          npm run test:private-native-gate
          npm run test:section28-sekiro-gate

      - name: Release content scan
        run: npm run test:release-content

      - name: Build
        run: npm run build

      # Intentionally NOT run in public CI:
      # - test:native-preview / test:real-mod (private mods)
      # - bridge:verify:oodle / native emevd/msb/fmg/param against local mods (private corpus)
      # - signed installer / real Sekiro launch (P7 private gate)
      # - SOULFORGE_PORTABLE_PACK=1 unsigned pack (optional local only)
