name: me3-authority-hardening

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/apply-me3-authority-hardening.mjs
      - .github/workflows/me3-authority-hardening.yml

permissions:
  contents: write

concurrency:
  group: me3-authority-hardening
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout runtime branch
        uses: actions/checkout@v4
        with:
          ref: agent/me3-runtime-foundation
          fetch-depth: 0
      - name: Repair migration source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-me3-authority-hardening.mjs')
          text = path.read_text(encoding='utf-8')
          repairs = [
              (
                  "message: '已通过 `me3 info` 确认所选文件是可工作的 me3 CLI；尚未执行真实 Sekiro Mod 加载验证。'",
                  "message: '已通过 me3 info 确认所选文件是可工作的 me3 CLI；尚未执行真实 Sekiro Mod 加载验证。'"
              ),
              (
                  "    'npm run test:runtime-session-manager\\n',\n    'npm run test:runtime-session-manager\\n# 仅在合法本地 me3 + Sekiro 环境显式运行：\\n# $env:SOULFORGE_PRIVATE_RUNTIME_GATE=\"1\"; npm run test:private-me3-sekiro-gate\\n',",
                  "    '~~~powershell\\nnpm run test:me3-runtime-adapter\\nnpm run test:runtime-session-manager\\nnpm run test:database-utility\\nnpm run test:desktop-security\\n~~~',\n    '~~~powershell\\nnpm run test:me3-runtime-adapter\\nnpm run test:runtime-session-manager\\nnpm run test:database-utility\\nnpm run test:desktop-security\\n# 仅在合法本地 me3 + Sekiro 环境显式运行：\\n# $env:SOULFORGE_PRIVATE_RUNTIME_GATE=\"1\"; npm run test:private-me3-sekiro-gate\\n~~~',"
              )
          ]
          for old, new in repairs:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one migration repair anchor, found {count}: {old[:80]}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply me3 authority hardening
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-me3-authority-hardening.mjs 2>&1 | tee me3-authority-migration.log
      - name: Upload migration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: me3-authority-migration-diagnostics
          path: me3-authority-migration.log
          if-no-files-found: error
      - name: Remove one-shot migration
        run: |
          rm scripts/apply-me3-authority-hardening.mjs
          rm .github/workflows/me3-authority-hardening.yml
          rm -f me3-authority-migration.log
      - name: Commit authority hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(runtime): harden me3 profile and executable authority"
          git push origin HEAD:agent/me3-runtime-foundation
