name: me3-runtime-debug

on:
  pull_request:
    branches: [main, master]

jobs:
  isolate-v05-foundation:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w @soulforge/shared
      - name: Build core
        run: npm run build -w @soulforge/core
      - name: Run V0.5 foundation smoke
        shell: pwsh
        run: |
          node packages/core/dist/testing/runV05FoundationSmoke.js *> v05-foundation.log
          $exitCode = $LASTEXITCODE
          Get-Content v05-foundation.log
          exit $exitCode
      - name: Upload foundation smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v05-foundation-log
          path: v05-foundation.log
          if-no-files-found: error
