name: me3-runtime-debug

on:
  pull_request:
    branches: [main, master]

jobs:
  locate-test-failure:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Core tests
        run: npm run test -w @soulforge/core
      - name: Desktop tests
        run: npm run test -w @soulforge/desktop
      - name: Desktop security
        run: npm run test:desktop-security
      - name: UI localization
        run: npm run test:ui-localization
      - name: Database utility
        run: npm run test:database-utility
