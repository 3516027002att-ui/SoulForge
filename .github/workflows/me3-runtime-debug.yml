name: me3-runtime-debug

on:
  pull_request:
    branches: [main, master]

jobs:
  verify-runtime-foundation:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared
        run: npm run build -w @soulforge/shared
      - name: Build core
        run: npm run build -w @soulforge/core
      - name: Run V0.5 foundation smoke
        run: node packages/core/dist/testing/runV05FoundationSmoke.js
      - name: Run me3 runtime smoke
        run: node packages/core/dist/testing/runMe3RuntimeAdapterSmoke.js
