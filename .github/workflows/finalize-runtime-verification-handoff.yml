name: finalize-runtime-verification-handoff

on:
  pull_request:
    branches: [main, master]
    paths:
      - scripts/finalize-runtime-verification-handoff.mjs
      - .github/workflows/finalize-runtime-verification-handoff.yml

permissions:
  contents: write

concurrency:
  group: finalize-runtime-verification-handoff
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout runtime branch
        uses: actions/checkout@v4
        with:
          ref: agent/me3-runtime-foundation
          fetch-depth: 0
      - name: Update unique handoff
        run: node scripts/finalize-runtime-verification-handoff.mjs
      - name: Remove one-shot finalizer
        run: |
          rm scripts/finalize-runtime-verification-handoff.mjs
          rm .github/workflows/finalize-runtime-verification-handoff.yml
      - name: Commit handoff evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: record runtime verification evidence chain"
          git push origin HEAD:agent/me3-runtime-foundation
